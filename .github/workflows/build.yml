name: Build Meshtastic Firmware for Nibble ESP32

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest Meshtastic firmware tag
        id: meshtastic-tag
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort=-v:refname https://github.com/meshtastic/firmware.git \
            | head -1 \
            | cut -d'/' -f3)
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest Meshtastic firmware tag: ${LATEST_TAG}"

      - name: Checkout Meshtastic firmware
        run: |
          git clone https://github.com/meshtastic/firmware ${GITHUB_WORKSPACE}/meshtastic
          cd ${GITHUB_WORKSPACE}/meshtastic
          git checkout refs/tags/${{ steps.meshtastic-tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Install Espressif32 platform
        run: platformio platform install espressif32

      - name: Copy nibble variant files into firmware tree
        run: |
          TARGET_DIR="${GITHUB_WORKSPACE}/meshtastic/variants/esp32s3/nibble-esp32"
          cp --update=all variant.h "${TARGET_DIR}/variant.h"
          cp --update=all platformio.ini "${TARGET_DIR}/platformio.ini"

      - name: Build firmware
        run: platformio run --project-dir ${GITHUB_WORKSPACE}/meshtastic -e "nibble-esp32"

      - name: Collect and checksum artifacts
        id: artifacts
        env:
          MESHTASTIC_TAG: ${{ steps.meshtastic-tag.outputs.tag }}
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/output
          cp ${GITHUB_WORKSPACE}/meshtastic/.pio/build/nibble-esp32/*.bin ${GITHUB_WORKSPACE}/output/ 2>/dev/null || true
          cd ${GITHUB_WORKSPACE}/output
          sha256sum *.bin | tee sha256sums.txt
          echo "artifact_count=$(ls -1 *.bin 2>/dev/null | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nibble-esp32-firmware-${{ steps.meshtastic-tag.outputs.tag }}
          path: output/*
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          MESHTASTIC_TAG: ${{ steps.meshtastic-tag.outputs.tag }}
        run: |
          RELEASE_TAG="nibble-esp32-${MESHTASTIC_TAG}"
          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --title "Nibble ESP32 Firmware (Meshtastic ${MESHTASTIC_TAG})" \
            --notes "Automated build based on Meshtastic firmware ${MESHTASTIC_TAG}." \
            output/*
